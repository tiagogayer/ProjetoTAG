name: docs

# Validate the repository's documentation and configuration on every change to main.
# First CI workflow for this repository. Markdown and YAML linting run
# through pre-commit, so the same checks run locally (git hook) and in CI, and their
# versions are pinned in .pre-commit-config.yaml and tracked by Dependabot. Each job
# is a distinct status check, selectable in the branch ruleset later.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: these jobs only read the checked-out tree.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check links
        # Default args check ./**/*.md|html|rst; fail=true breaks the job on broken
        # links; the default github.token avoids GitHub rate limiting.
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
