# pre-commit config used by the docs CI to lint Markdown and YAML
# (`pre-commit run --all-files`). Validation runs in CI — no local setup is needed.
# Hook versions (rev) are pinned and kept fresh by Dependabot's native "pre-commit"
# ecosystem — see .github/dependabot.yml. Reference: https://pre-commit.com

repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      # Lints every YAML file; reads .yamllint.yml at the repo root automatically.
      - id: yamllint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      # Lints every Markdown file; reads .markdownlint-cli2.jsonc automatically.
      - id: markdownlint-cli2
