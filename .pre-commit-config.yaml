# Hooks: yamllint for all YAML files, markdownlint-cli2 for adr/ only.

repos:
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      # Lints every YAML file; reads .yamllint.yml at the repo root automatically.
      - id: yamllint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      # Lints Markdown files under adr/ only; reads .markdownlint-cli2.jsonc automatically.
      - id: markdownlint-cli2
        files: ^adr/.*\.md$
